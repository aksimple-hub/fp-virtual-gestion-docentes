services:
    app-backend:
        build: .
        container_name: gestion-docentes-app
        command: php artisan serve --host=0.0.0.0 --port=8000

    mysql:
        image: mysql
        volumes:
            - mysql:/var/lib/mysql
        ports:
            - "8082:8000"
        networks:
            - red-interna
        depends_on:
            - mysql-db
            - 23306:3306
        environment:
            DB_HOST: mysql-db

    mysql-db:
        image: mysql:8.0
        ports:
            - "3306:3306" # Para conectar desde el PC con DBeaver/TablePlus
        volumes:
            - db_data:/var/lib/mysql
        networks:
            - red-interna
            - MYSQL_USER=${DB_USERNAME}
            - MYSQL_PASSWORD=${DB_PASSWORD}
            - MYSQL_ROOT_PASSWORD=${DB_PASSWORD_ROOT}
            - MYSQL_DATABASE=${DB_DATABASE}
    phpmyadmin:
        image: phpmyadmin
        environment:
            MYSQL_DATABASE: instituto
            MYSQL_USER: alumno
            MYSQL_PASSWORD: alumno
            MYSQL_ROOT_PASSWORD: root12345
networks:
    red-interna:
        driver: bridge

volumes:
    db_data:

